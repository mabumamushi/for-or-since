<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For? Since?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <section class="top-bar">
      <div class="title-control-row">
        <div>
          <h1>For? Since?</h1>
        </div>

        <div class="mini-controls">
          <button id="upButton">↑<span>for</span></button>
          <button id="downButton">↓<span>since</span></button>
        </div>
      </div>

      <div class="score-row">
        <div class="score-box">
          <span>SCORE</span>
          <strong id="score">0</strong>
        </div>

        <div class="score-box high-score">
          <span>HIGH</span>
          <strong id="highScore">0</strong>
        </div>
      </div>
    </section>

    <section class="game-area" id="gameArea">
      <div class="danger-line"></div>

      <div class="center-message" id="message">
        <h2>For? Since?</h2>
        <p>流れてくるカードを見て、正しい矢印キーを押そう。</p>
        <button id="startButton">START</button>
      </div>
    </section>

    <section class="review-panel" id="reviewPanel">
      <div id="reviewList"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
