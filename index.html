<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For? Since?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <section class="top-bar">
      <div class="left-header">
        <div class="mode-row">
          <button class="mode-button active" id="forSinceModeButton">For / Since</button>
          <button class="mode-button" id="perfectModeButton">現在完了 3用法</button>
        </div>

        <div class="title-control-row">
          <div>
            <h1 id="gameTitle">For? Since?</h1>
          </div>

          <div class="mini-controls" id="miniControls"></div>
        </div>
      </div>

      <div class="score-row">
        <div class="score-box">
          <span>SCORE</span>
          <strong id="score">0</strong>
        </div>

        <div class="score-box high-score">
          <span>HIGH</span>
          <strong id="highScore">0</strong>
        </div>
      </div>
    </section>

    <section class="game-area" id="gameArea">
      <div class="danger-line"></div>

      <div class="center-message" id="message">
        <h2 id="messageTitle">For? Since?</h2>
        <p id="messageText">流れてくるカードを見て、正しい矢印キーを押そう。</p>
        <button id="startButton">START</button>
      </div>
    </section>

    <section class="review-panel" id="reviewPanel">
      <div id="reviewList"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
